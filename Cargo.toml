[package]
name = "finance-api"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4.13.0"
serde = { version = "1.0.149", features = ["derive"] }
serde_json = "1.0.149"
sqlx = {version = "0.8.6", features = ["runtime-tokio-rustls", "sqlite", "macros", "time"]}
time = { version = "0.3.47", features = ["serde"] }
